<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F6F9;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            color: #1F2937;
        }
        .wrapper {
            width: 100%;
            background-color: #F4F6F9;
            padding: 40px 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
        }
        .header {
            background-color: #0F0F14;
            padding: 32px;
            text-align: center;
        }
        .logo-text {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }
        .content {
            padding: 40px 32px;
            line-height: 1.6;
        }
        .greeting {
            font-size: 18px;
            font-weight: 700;
            color: #0F0F14;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .text {
            font-size: 15px;
            color: #4B5563;
            margin-bottom: 24px;
        }
        .btn-container {
            text-align: center;
            margin: 32px 0;
        }
        .btn {
            background-color: #1A73E8;
            color: #FFFFFF !important;
            padding: 14px 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.15);
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #1557B0;
        }
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            overflow: hidden;
        }
        .details-table th, .details-table td {
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
        }
        .details-table th {
            background-color: #F8FAFC;
            color: #374151;
            font-weight: 600;
            border-bottom: 1px solid #E5E7EB;
            width: 35%;
        }
        .details-table td {
            color: #4B5563;
            border-bottom: 1px solid #E5E7EB;
        }
        .details-table tr:last-child th, .details-table tr:last-child td {
            border-bottom: none;
        }
        .footer {
            background-color: #F8FAFC;
            padding: 32px;
            text-align: center;
            border-top: 1px solid #E5E7EB;
        }
        .footer-text {
            font-size: 13px;
            color: #6B7280;
            margin: 0 0 12px 0;
        }
        .footer-link {
            color: #1A73E8;
            text-decoration: none;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
        }
        .badge-success { background-color: #DEF7EC; color: #03543F; }
        .badge-warning { background-color: #FEF08A; color: #713F12; }
        .badge-info { background-color: #E1EFFE; color: #1E429F; }
        .badge-error { background-color: #FDE8E8; color: #9B1C1C; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <!-- Professional Header -->
            <div class="header">
                <h1 class="logo-text">WORKIZO</h1>
            </div>
            
            <!-- Email Body Content -->
            <div class="content">
                {% if user_name %}
                    <p class="greeting">Hello {{ user_name }},</p>
                {% else %}
                    <p class="greeting">Hello,</p>
                {% endif %}
                
                {% block email_content %}{% endblock %}
            </div>
            
            <!-- Footer -->
            <div class="footer">
                <p class="footer-text">Need assistance? <a href="mailto:support@workizo.com" class="footer-link">Contact Support</a></p>
                <p class="footer-text">&copy; {% now "Y" %} WORKIZO. All rights reserved.</p>
                <p class="footer-text" style="font-size: 11px; color: #9CA3AF; margin-top: 12px;">This is an automated notification. Please do not reply directly to this email.</p>
            </div>
        </div>
    </div>
</body>
</html>
